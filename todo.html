<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项</title>
<style>
  :root {
    --rose: #EB9FAA;
    --rose-deep: #d47888;
    --rose-dark: #b85060;
    --blush: #F7D2D5;
    --petal: #FCEFF0;
    --slate: #C0CEE4;
    --slate-deep: #8a9bb5;
    --text: #3d2c33;
    --text-soft: #7a6570;
    --text-muted: #b0a0a8;
    --glass: rgba(255,255,255,0.55);
    --glass-strong: rgba(255,255,255,0.72);
    --glass-hover: rgba(255,255,255,0.85);
    --shadow-sm: 0 1px 2px rgba(60,30,40,0.06), 0 1px 3px rgba(60,30,40,0.04);
    --shadow-md: 0 4px 16px rgba(60,30,40,0.08), 0 2px 6px rgba(60,30,40,0.04);
    --shadow-lg: 0 8px 32px rgba(60,30,40,0.10), 0 3px 10px rgba(60,30,40,0.05);
    --shadow-xl: 0 16px 48px rgba(60,30,40,0.12), 0 6px 20px rgba(60,30,40,0.06);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 20px;
    background: linear-gradient(160deg, #f5e6e9 0%, #eed5da 25%, #e8c8d0 50%, #d5dce8 85%, #c8d3e4 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Ambient glow orbs ── */
  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(235,159,170,0.5) 0%, transparent 70%);
    top: -80px; left: -120px;
  }
  body::after {
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(192,206,228,0.55) 0%, transparent 70%);
    bottom: -60px; right: -100px;
  }

  /* ── Main container: frosted glass ── */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(255,255,255,0.38);
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    border-radius: 24px;
    padding: 28px 24px 24px;
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow:
      0 8px 32px rgba(60,30,40,0.10),
      0 2px 8px rgba(60,30,40,0.05),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0 4px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  }
  .header .date {
    font-size: 13px;
    color: var(--text-soft);
    font-weight: 500;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1.5px solid rgba(192,206,228,0.35);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    background: rgba(255,255,255,0.45);
    font-family: inherit;
    color: var(--text);
    transition: all 0.25s ease;
    box-shadow: var(--shadow-sm);
  }
  .search-wrap input:focus {
    border-color: rgba(235,159,170,0.5);
    background: rgba(255,255,255,0.7);
    box-shadow: 0 0 0 3px rgba(235,159,170,0.12), var(--shadow-sm);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* ── Add form ── */
  .add-form {
    background: var(--glass);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(255,255,255,0.4);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .add-form .main-row {
    display: flex;
    gap: 10px;
  }
  .add-form .main-row input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid rgba(192,206,228,0.4);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    background: rgba(255,255,255,0.5);
    font-family: inherit;
    color: var(--text);
    transition: all 0.25s ease;
  }
  .add-form .main-row input[type="text"]:focus {
    border-color: var(--rose);
    background: rgba(255,255,255,0.75);
    box-shadow: 0 0 0 3px rgba(235,159,170,0.12);
  }
  .add-form .main-row input[type="text"]::placeholder { color: var(--text-muted); }
  .add-form .btn-add {
    padding: 10px 22px;
    background: linear-gradient(135deg, #EB9FAA 0%, #e08898 100%);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    font-family: inherit;
    box-shadow: 0 2px 8px rgba(210,110,130,0.25);
  }
  .add-form .btn-add:hover {
    background: linear-gradient(135deg, #e5929f 0%, #d47888 100%);
    box-shadow: 0 4px 14px rgba(210,110,130,0.35);
    transform: translateY(-1px);
  }
  .add-form .btn-add:active { transform: scale(0.97) translateY(0); }

  .add-form .extra-row {
    display: none;
    gap: 8px;
    align-items: center;
  }
  .add-form .extra-row.open { display: flex; }
  .add-form .extra-row input[type="date"],
  .add-form .extra-row select {
    padding: 7px 12px;
    border: 1.5px solid rgba(192,206,228,0.4);
    border-radius: var(--radius-xs);
    font-size: 13px;
    outline: none;
    background: rgba(255,255,255,0.5);
    font-family: inherit;
    color: var(--text-soft);
    cursor: pointer;
    transition: border 0.2s;
  }
  .add-form .extra-row input[type="date"]:focus,
  .add-form .extra-row select:focus {
    border-color: var(--rose);
  }
  .btn-toggle {
    padding: 7px 14px;
    border: 1.5px dashed rgba(192,206,228,0.5);
    background: transparent;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-soft);
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-toggle:hover {
    border-color: var(--rose);
    color: var(--rose-dark);
    background: rgba(235,159,170,0.06);
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stats-bar .filter-btn {
    padding: 7px 15px;
    border: 1.5px solid rgba(192,206,228,0.35);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: var(--glass);
    color: var(--text-soft);
    transition: all 0.2s ease;
    font-family: inherit;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .stats-bar .filter-btn:hover {
    border-color: var(--rose);
    color: var(--rose-dark);
    background: rgba(235,159,170,0.08);
  }
  .stats-bar .filter-btn.active {
    background: var(--rose);
    color: white;
    border-color: var(--rose);
    box-shadow: 0 2px 8px rgba(210,110,130,0.2);
  }
  .stats-bar .spacer { flex: 1; }
  .stats-bar .count {
    font-size: 13px;
    color: var(--text-soft);
    font-weight: 500;
    padding: 0 4px;
  }
  .stats-bar .clear-btn {
    padding: 7px 14px;
    border: none;
    background: transparent;
    color: var(--rose-deep);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
    font-family: inherit;
    display: none;
  }
  .stats-bar .clear-btn:hover { background: rgba(235,159,170,0.12); }

  /* ── Todo list ── */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 80px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .todo-list.empty::after {
    content: '';
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 140px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    white-space: pre-line;
    text-align: center;
    line-height: 1.8;
  }
  .todo-list.empty:not(.filtered)::after {
    content: '✨\A 添加你的第一个待办事项吧';
  }
  .todo-list.empty.filtered::after {
    content: '没有匹配的事项';
  }

  /* ── Scrollbar ── */
  .todo-list::-webkit-scrollbar { width: 5px; }
  .todo-list::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
  .todo-list::-webkit-scrollbar-thumb {
    background: rgba(192,206,228,0.5);
    border-radius: 10px;
  }
  .todo-list::-webkit-scrollbar-thumb:hover { background: rgba(192,206,228,0.8); }

  /* ── Todo item ── */
  .todo-item {
    background: var(--glass);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.25s ease;
    cursor: grab;
    animation: itemIn 0.35s ease-out both;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  @keyframes itemIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .todo-item:hover {
    background: var(--glass-hover);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .todo-item.dragging {
    opacity: 0.5;
    transform: scale(0.97);
    box-shadow: var(--shadow-lg);
  }
  .todo-item.drag-over {
    border-top: 3px solid var(--rose);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .todo-item.completed {
    opacity: 0.55;
  }
  .todo-item.completed .todo-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* ── Checkbox ── */
  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(192,206,228,0.7);
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.5);
    position: relative;
  }
  .checkbox:hover { border-color: var(--rose); transform: scale(1.1); }
  .checkbox.checked {
    background: #8db88d;
    border-color: #8db88d;
    box-shadow: 0 0 0 3px rgba(141,184,141,0.2);
  }
  .checkbox.checked::after {
    content: '';
    display: block;
    width: 5px; height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    border-radius: 1px;
    transform: rotate(45deg) translateY(-1px);
  }

  /* ── Todo content ── */
  .todo-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .todo-title {
    font-size: 14px;
    font-weight: 500;
    word-break: break-word;
    color: var(--text);
    line-height: 1.4;
  }
  .todo-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
  }
  .priority-badge {
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .priority-high {
    background: rgba(235,159,170,0.18);
    color: #b85060;
  }
  .priority-medium {
    background: rgba(192,206,228,0.25);
    color: #6a7790;
  }
  .priority-low {
    background: rgba(141,184,141,0.18);
    color: #5a8a5a;
  }
  .due-date {
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--text-soft);
    font-size: 12px;
  }
  .due-date.overdue { color: #d4607a; font-weight: 600; }
  .due-date.today   { color: #c08040; font-weight: 600; }

  /* ── Item actions ── */
  .todo-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .todo-item:hover .todo-actions { opacity: 1; }
  .todo-actions button {
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    color: var(--text-soft);
  }
  .todo-actions button:hover { background: rgba(192,206,228,0.25); }
  .todo-actions button.delete-btn:hover {
    background: rgba(235,159,170,0.25);
    color: var(--rose-dark);
  }

  /* ── Edit mode ── */
  .todo-item.editing {
    flex-wrap: wrap;
    background: var(--glass-hover);
    border-color: rgba(235,159,170,0.3);
  }
  .todo-item.editing .todo-content { width: 100%; gap: 8px; }
  .todo-item.editing .edit-input {
    width: 100%;
    padding: 8px 12px;
    border: 2px solid var(--rose);
    border-radius: var(--radius-xs);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    background: rgba(255,255,255,0.7);
  }
  .todo-item.editing .edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .todo-item.editing .edit-row select,
  .todo-item.editing .edit-row input[type="date"] {
    padding: 6px 10px;
    border: 1.5px solid rgba(192,206,228,0.5);
    border-radius: var(--radius-xs);
    font-size: 12px;
    font-family: inherit;
    background: rgba(255,255,255,0.5);
  }
  .edit-actions { display: flex; gap: 6px; }
  .edit-save {
    padding: 6px 16px;
    border-radius: var(--radius-xs);
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    background: var(--rose);
    color: white;
    transition: all 0.2s;
  }
  .edit-save:hover { background: var(--rose-deep); }
  .edit-cancel {
    padding: 6px 14px;
    border-radius: var(--radius-xs);
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    background: rgba(192,206,228,0.3);
    color: var(--text-soft);
    transition: all 0.2s;
  }
  .edit-cancel:hover { background: rgba(192,206,228,0.5); }

  /* ── Hint ── */
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 2px 0;
    letter-spacing: 0.02em;
  }

  .todo-list.rendered .todo-item { animation: none; }
</style>

<script src="todo-core.js"></script>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>待办事项</h1>
    <span class="date" id="currentDate"></span>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜索待办事项…" autocomplete="off">
  </div>

  <div class="add-form" id="addForm">
    <div class="main-row">
      <input type="text" id="todoInput" placeholder="添加新的待办事项…" maxlength="200" autofocus autocomplete="off">
      <button class="btn-add" id="addBtn">添加</button>
    </div>
    <button class="btn-toggle" id="toggleExtras">+ 更多选项</button>
    <div class="extra-row" id="addExtras">
      <input type="date" id="dueDateInput">
      <select id="priorityInput">
        <option value="low">低优先级</option>
        <option value="medium" selected>中优先级</option>
        <option value="high">高优先级</option>
      </select>
    </div>
  </div>

  <div class="stats-bar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="active">未完成</button>
    <button class="filter-btn" data-filter="completed">已完成</button>
    <span class="spacer"></span>
    <span class="count" id="taskCount"></span>
    <button class="clear-btn" id="clearCompleted">清除已完成</button>
  </div>

  <div class="todo-list empty" id="todoList"></div>
  <div class="hint">拖拽排序 · 点击 ✎ 编辑</div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'desktop-todo-items';
  let todos = [];
  let filter = 'all';
  let searchQuery = '';
  let dragSrc = null;
  let editingId = null;
  let searchTimer = null;

  const todoInput = document.getElementById('todoInput');
  const dueDateInput = document.getElementById('dueDateInput');
  const priorityInput = document.getElementById('priorityInput');
  const addBtn = document.getElementById('addBtn');
  const addExtras = document.getElementById('addExtras');
  const toggleExtras = document.getElementById('toggleExtras');
  const todoList = document.getElementById('todoList');
  const taskCount = document.getElementById('taskCount');
  const clearCompleted = document.getElementById('clearCompleted');
  const searchInput = document.getElementById('searchInput');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const currentDateEl = document.getElementById('currentDate');
  function commit() { save(); render(); }

  (() => {
    const now = new Date();
    const weekdays = ['日','一','二','三','四','五','六'];
    currentDateEl.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;
  })();

  function load() {
    try { const r = localStorage.getItem(STORAGE_KEY); todos = r ? JSON.parse(r) : []; }
    catch { todos = []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

  function addTodo() {
    const title = todoInput.value.trim();
    if (!title) return;
    todos.unshift({
      id: TC.uid(), title, completed: false,
      priority: priorityInput.value,
      dueDate: dueDateInput.value || null
    });
    todoInput.value = '';
    dueDateInput.value = '';
    priorityInput.value = 'medium';
    commit();
    todoInput.focus();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.completed = !t.completed; commit(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    if (editingId === id) editingId = null;
    commit();
  }

  function clearCompletedTodos() {
    todos = todos.filter(t => !t.completed);
    commit();
  }

  function render() {
    const filtered = TC.filterTodos(todos, filter, searchQuery);
    let activeCount = 0, completedCount = 0;
    for (const t of todos) { if (t.completed) completedCount++; else activeCount++; }

    taskCount.textContent = `${activeCount} 项待完成`;
    clearCompleted.style.display = completedCount > 0 ? '' : 'none';

    if (filtered.length === 0) {
      todoList.classList.add('empty');
      todoList.classList.toggle('filtered', !!(searchQuery || filter !== 'all'));
    } else {
      todoList.classList.remove('empty', 'filtered');
    }

    const todayMs = TC.getTodayMs();

    todoList.innerHTML = filtered.map((todo, i) => {
      const due = TC.dueInfo(todo.dueDate, todayMs);
      if (todo.id === editingId) {
        return `<div class="todo-item editing" data-id="${todo.id}">
          <div class="todo-content" style="gap:6px;">
            <input class="edit-input" value="${TC.esc(todo.title)}" data-field="title">
            <div class="edit-row">
              <select data-field="priority">
                <option value="high" ${todo.priority==='high'?'selected':''}>高优先级</option>
                <option value="medium" ${todo.priority==='medium'?'selected':''}>中优先级</option>
                <option value="low" ${todo.priority==='low'?'selected':''}>低优先级</option>
              </select>
              <input type="date" value="${todo.dueDate||''}" data-field="dueDate">
              <span style="flex:1"></span>
              <div class="edit-actions">
                <button class="edit-save">保存</button>
                <button class="edit-cancel">取消</button>
              </div>
            </div>
          </div>
        </div>`;
      }
      return `<div class="todo-item ${todo.completed?'completed':''}" data-id="${todo.id}" draggable="true" style="animation-delay:${i*0.03}s">
        <div class="checkbox ${todo.completed?'checked':''}" data-action="toggle"></div>
        <div class="todo-content">
          <span class="todo-title">${TC.esc(todo.title)}</span>
          <div class="todo-meta">
            <span class="priority-badge priority-${todo.priority}">${TC.PRI_LABELS[todo.priority]}</span>
            ${due ? `<span class="due-date ${due.cls}">📅 ${due.label}</span>` : ''}
          </div>
        </div>
        <div class="todo-actions">
          <button data-action="edit" title="编辑">✎</button>
          <button class="delete-btn" data-action="delete" title="删除">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  todoList.addEventListener('click', e => {
    const item = e.target.closest('.todo-item');
    if (!item) return;
    const id = item.dataset.id;
    const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;

    if (action === 'toggle' || e.target.classList.contains('checkbox')) {
      toggleTodo(id);
    } else if (action === 'delete') {
      deleteTodo(id);
    } else if (action === 'edit') {
      editingId = id; render();
      setTimeout(() => {
        const inp = todoList.querySelector(`[data-id="${id}"] .edit-input`);
        if (inp) { inp.focus(); inp.select(); }
      }, 40);
    } else if (e.target.classList.contains('edit-save')) {
      const t = todos.find(t => t.id === id);
      if (t) {
        const ti = item.querySelector('[data-field="title"]');
        const pi = item.querySelector('[data-field="priority"]');
        const di = item.querySelector('[data-field="dueDate"]');
        if (ti && ti.value.trim()) {
          t.title = ti.value.trim();
          t.priority = pi.value;
          t.dueDate = di.value || null;
          editingId = null;
          commit();
        }
      }
    } else if (e.target.classList.contains('edit-cancel')) {
      editingId = null; render();
    }
  });

  todoList.addEventListener('keydown', e => {
    if (!e.target.classList.contains('edit-input')) return;
    const item = e.target.closest('.todo-item');
    if (!item) return;
    if (e.key === 'Enter') { const b = item.querySelector('.edit-save'); if (b) b.click(); }
    if (e.key === 'Escape') { const b = item.querySelector('.edit-cancel'); if (b) b.click(); }
  });

  function clearDragOvers() {
    todoList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }

  todoList.addEventListener('dragstart', e => {
    const item = e.target.closest('.todo-item');
    if (!item || item.classList.contains('editing')) { e.preventDefault(); return; }
    dragSrc = item;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  todoList.addEventListener('dragend', () => {
    if (dragSrc) dragSrc.classList.remove('dragging');
    clearDragOvers();
    dragSrc = null;
  });
  todoList.addEventListener('dragover', e => {
    e.preventDefault();
    const item = e.target.closest('.todo-item');
    if (!item || item === dragSrc || item.classList.contains('editing')) return;
    e.dataTransfer.dropEffect = 'move';
    clearDragOvers();
    item.classList.add('drag-over');
  });
  todoList.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.todo-item');
    if (!target || target === dragSrc || target.classList.contains('editing')) return;
    const srcId = dragSrc.dataset.id;
    const targetId = target.dataset.id;
    const si = todos.findIndex(t => t.id === srcId);
    const ti = todos.findIndex(t => t.id === targetId);
    if (si !== -1 && ti !== -1) {
      const [moved] = todos.splice(si, 1);
      todos.splice(ti, 0, moved);
      commit();
    }
  });

  addBtn.addEventListener('click', addTodo);
  todoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  toggleExtras.addEventListener('click', () => {
    const open = addExtras.classList.toggle('open');
    toggleExtras.textContent = open ? '− 收起' : '+ 更多选项';
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const newFilter = btn.dataset.filter;
      if (filter === newFilter) return;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = newFilter;
      render();
    });
  });

  clearCompleted.addEventListener('click', clearCompletedTodos);

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const val = searchInput.value.trim();
      if (val === searchQuery) return;
      searchQuery = val;
      render();
    }, 180);
  });

  load(); render();
  todoList.classList.add('rendered');
  todoInput.focus();
})();
</script>
</body>
</html>
